<div class="container mt-4">
  <h2>Authentication</h2>
  <p>Select an authentication provider to log in.</p>
  
  <div class="row mt-4">
    @for (session of sessionsSig(); track session.config.name) {
      <div class="col-md-6 mb-3">
        <app-auth-card [session]="session"></app-auth-card>
      </div>
    }
  </div>
</div>
