<div class="container mt-4">
  <h2>Login Portal@if(sessionsSig()?.length ?? 0 > 1){s}
  </h2>
  <div class="row mt-4">
    @for (session of sessionsSig(); track session.config.name) {
      <div class="col-md-6 mb-3">
        <app-auth-card [session]="session"></app-auth-card>
      </div>
    }
  </div>
</div>
