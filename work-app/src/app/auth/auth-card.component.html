<div class="card">
    <div class="card-body">
        <h5 class="card-title">{{ provider.display }}</h5>

        @if (providerState().isLoggedIn) {
        <p class="card-text text-success mb-2">Logged In
            @if (providerState().userData; as user) {
                : {{ user.sub || user.name || 'Unknown' }}
            }
        </p>

        <div class="mb-2 text-warning">
            <strong>Expires in:</strong> {{ timeRemaining() }}
        </div>
        @if (renewalRemaining()) {
        <div class="mb-3 text-info">
            <strong>Renews in:</strong> {{ renewalRemaining() }}
        </div>
        }
        <div class="d-flex gap-2">
            <button class="btn btn-outline-primary" (click)="renew()">Renew</button>
            <button class="btn btn-outline-danger" (click)="logout()">Log Out</button>
        </div>
        } @else {
        <p class="card-text text-secondary mb-3">Not logged in</p>
        <button class="btn btn-primary" (click)="login()">
            Login with {{ provider.display }}
        </button>
        }
    </div>
</div>
